version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: medtwin_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: medtwin_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: medtwin_backend
    restart: always
    environment:
      DATABASE_URL: postgresql://postgres:postgrespassword@postgres:5432/medtwin_db
      JWT_SECRET: supersecretjwtkeymedtwinai2026
      GROQ_API_KEY: ${GROQ_API_KEY:-your_default_groq_key}
      POLYGON_RPC_URL: ${POLYGON_RPC_URL:-https://rpc-amoy.polygon.technology}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./ai:/app/ai_module

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: medtwin_frontend
    restart: always
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
